<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voices & Vibes — Production Launcher</title>
  <style>
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      font-family:Arial,sans-serif;
      background:radial-gradient(circle at top,#122020 0%,#090909 45%,#040404 100%);
      color:#fff;
    }
    .card{
      width:min(720px,100%);
      background:linear-gradient(180deg,rgba(20,26,26,.98),rgba(12,14,14,.98));
      border:1px solid rgba(0,196,196,.18);
      padding:32px;
      box-shadow:0 24px 80px rgba(0,0,0,.38),0 0 40px rgba(0,155,155,.10);
      text-align:center;
    }
    h1{
      margin:0 0 8px;
      font-size:2rem;
      background:linear-gradient(135deg,#00c4c4,#e8624a);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }
    p{color:#9ec3c3;line-height:1.7;font-size:15px}
    .btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:22px}
    a{
      text-decoration:none;
      padding:14px 18px;
      font-weight:700;
      letter-spacing:.08em;
      text-transform:uppercase;
      font-size:12px;
    }
    .primary{background:#00a8a8;color:#051111}
    .secondary{border:1px solid rgba(0,196,196,.28);color:#00d0d0;background:rgba(0,168,168,.08)}
    .file{margin-top:16px;font-size:12px;color:#7ea6a6}
  </style>
</head>
<body>
  <div class="card">
    <h1>Voices &amp; Vibes Radio</h1>
    <p>This is the production launcher for the latest approved build. Use it to open <strong>VV Player 9</strong> directly on your computer.</p>
    <div class="btns">
      <a class="primary" href="vv-artist-player-v9.html">Open VV Player 9</a>
      <a class="secondary" href="launcher.html">Open Multi-Version Launcher</a>
    </div>
    <div class="file">Latest production file: vv-artist-player-v9.html</div>
  </div>
</body>
</html>
